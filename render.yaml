services:
  # 1. API - O core do sistema
  - type: web
    name: ceo-ia-api
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ceo-ia-db
          property: connectionString
      - key: REDIS_URL
        sync: false # Coloque sua URL do Upstash aqui se não usar o do Render
      - key: AI_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: IS_PRODUCTION
        value: "true"
      - key: SECRET_KEY
        sync: false
      - key: ADMIN_TOKEN
        sync: false

  # 2. Worker - Processa background jobs
  - type: worker
    name: ceo-ia-worker
    runtime: docker
    plan: free
    dockerCommand: ./worker.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ceo-ia-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: AI_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false

databases:
  - name: ceo-ia-db
    plan: free
