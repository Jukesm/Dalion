services:
  # 1. API - O core do sistema (Agora rodando API + Worker junto para ser FREE)
  - type: web
    name: ceo-ia-api
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ceo-ia-db
          property: connectionString
      - key: REDIS_URL
        sync: false # Coloque sua URL do Upstash aqui (necessário para os jobs)
      - key: AI_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: IS_PRODUCTION
        value: "true"
      - key: SECRET_KEY
        sync: false
      - key: ADMIN_TOKEN
        sync: false

databases:
  - name: ceo-ia-db
    plan: free
